<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Intervip - Painel da Logística</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="stylesheets/style.css">
    <link rel="stylesheet" href="stylesheets/painel-logistica.css">
</head>
<body class="gerenciaIVP-body">
    <header class="header-modern">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <a href="/main" class="d-flex align-items-center text-decoration-none">
                    <img class="logo me-3" src="images/logo.png" alt="Logo Intervip">
                </a>
            </div>
            <h1 class="header-title fs-4 fw-semibold text-white m-0">Painel de Logística</h1>
            <div class="d-flex align-items-center">
                
                <div class="user-info text-end me-4">
                    <p class="m-0 small text-white-80">Acessando como: <span class="fw-medium">{username}</span></p>
                    <p class="m-0 small text-white-80">Setor: <span class="fw-medium">{group}</span></p>
                </div>
                <button id="theme-toggle" class="btn btn-sm btn-outline-dark rounded-pill px-3">
                    <i class="bi bi-moon-stars"></i>
                </button>
                <button id="btnLogout" class="btn btn-sm btn-outline-danger rounded-pill px-3 ms-2">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container-fluid py-4">
        <div class="ivp-card mb-4 p-3">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label fw-bold">Data da Agenda</label>
                    <input type="date" id="filtro-data" class="form-control form-control-lg">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Município / Região</label>
                    <select id="filtro-municipio" class="form-select form-select-lg">
                        <option value="TODOS">Todas as Regiões</option>
                        <option value="SERRA">Serra</option>
                        <option value="VILA VELHA">Vila Velha</option>
                        <option value="VITORIA">Vitória</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary btn-lg w-100" id="btn-carregar-agenda">
                        <i class="bi bi-arrow-clockwise me-2"></i>Carregar
                    </button>
                </div>
            </div>
        </div>

        <div class="row g-4 flex-nowrap overflow-auto pb-3" id="kanban-board" style="min-height: 60vh;">
            
            <div class="col-12 col-md-4 col-lg-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h5 class="fw-bold text-danger m-0"><i class="bi bi-inbox-fill me-2"></i>Aguardando</h5>
                    <span class="badge bg-danger rounded-pill" id="count-aguardando">0</span>
                </div>
                <div class="kanban-col border border-danger border-opacity-25" id="col-aguardando" data-status="AGUARDANDO_LOGISTICA" ondragover="allowDrop(event)" ondrop="drop(event)">
                    </div>
            </div>

            <div class="col-12 col-md-4 col-lg-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h5 class="fw-bold text-primary m-0"><i class="bi bi-person-workspace me-2"></i>Wesley</h5>
                    <span class="badge bg-primary rounded-pill" id="count-tec-1">0</span>
                </div>
                <div class="kanban-col border border-primary border-opacity-25" id="col-tec-1" data-tecnico-id="1" ondragover="allowDrop(event)" ondrop="drop(event)">
                </div>
            </div>

            <div class="col-12 col-md-4 col-lg-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h5 class="fw-bold text-success m-0"><i class="bi bi-person-workspace me-2"></i>Solimar</h5>
                    <span class="badge bg-success rounded-pill" id="count-tec-2">0</span>
                </div>
                <div class="kanban-col border border-success border-opacity-25" id="col-tec-2" data-tecnico-id="2" ondragover="allowDrop(event)" ondrop="drop(event)">
                </div>
            </div>

            </div>
    </main>
    
    <footer class="ivp-footer">
         <div class="container-fluid py-3">
            <div class="text-center">
                <img src="images/logo.png" alt="Logo Intervip" width="100">
                <p class="ivp-footer-text">
                    © 2026 Gerência Intervip | Desenvolvido por 
                    <a href="https://github.com/guilherme-wallace" target="_blank">Guilherme Wallace</a>
                </p>
            </div>
        </div>
    </footer>

    <script src="javascripts/jquery.js"></script>
    <script src="javascripts/bootstrap.bundle.min.js"></script>
    <script src="javascripts/bootstrap-autocomplete.min.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/5.0.9/jquery.inputmask.min.js"></script>
    <script src="javascripts/painel-logistica.js"></script>
</body>
</html>
