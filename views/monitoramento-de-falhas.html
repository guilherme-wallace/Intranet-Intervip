<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Intervip - Monitoramento de Falhas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="stylesheets/style.css"> 
    <link rel="stylesheet" href="stylesheets/monitoramento-de-falhas.css">
</head>

<body class="gerenciaIVP-body">

    <header class="header-modern">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <a href="/main" class="d-flex align-items-center text-decoration-none">
                    <img class="logo me-3" src="images/logo.png" alt="Logo Intervip">
                </a>
            </div>
            <h1 class="header-title fs-4 fw-semibold text-white m-0">🚨 Monitoramento de Falhas</h1>
            <div class="d-flex align-items-center">
                <div class="user-info text-end me-4">
                    <p class="m-0 small text-white-80">Acessando como: <span class="fw-medium">{username}</span></p>
                    <p class="m-0 small text-white-80">Setor: <span class="fw-medium">{group}</span></p>
                </div>
                <button id="theme-toggle" class="btn btn-sm btn-outline-light rounded-pill px-3">
                    <i class="bi bi-moon-stars"></i>
                </button>
                <button id="btnLogout" class="btn btn-sm btn-outline-danger rounded-pill px-3 ms-2">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container-fluid py-4 ivp-main">
        <div class="row">
            <div class="col-12">
                <div class="ivp-card">
                    
                    <div class="card-header bg-transparent border-bottom py-3">
                        <div class="row align-items-center g-3">
                            <div class="col-md-4">
                                <h5 class="mb-0 fw-bold text-danger">
                                    <i class="bi bi-activity me-2"></i>Massivas e Alertas Ativos
                                    <span id="badge-total-falhas" class="badge bg-danger ms-2">0</span>
                                </h5>
                            </div>

                            <div class="col-md-8 d-flex justify-content-md-end gap-2">
                                <button class="btn btn-outline-secondary btn-sm" id="btn-atualizar">
                                    <i class="bi bi-arrow-clockwise"></i> Atualizar
                                </button>
                                <button class="btn btn-primary btn-sm px-3" id="btn-novo-alerta">
                                    <i class="bi bi-plus-lg me-1"></i> Inserir Falha Manual
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0" id="tabela-monitoramento-de-falhas">
                                <thead class="table-light text-secondary small text-uppercase">
                                    <tr>
                                        <th style="width: 50px;"></th> 
                                        <th>Início da Falha</th>
                                        <th>Região / Equipamento (Pai)</th>
                                        <th>Afetados</th>
                                        <th>Status</th>
                                        <th class="text-end">Ações</th> 
                                    </tr>
                                </thead>
                                <tbody class="border-top-0" id="tbody-monitoramento-de-falhas">
                                    </tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>
    
    <footer class="ivp-footer">
         <div class="container-fluid py-3">
            <div class="text-center">
                <img src="images/logo.png" alt="Logo Intervip" width="100">
                <p class="ivp-footer-text">
                    © 2025 Gerência Intervip | Desenvolvido por 
                    <a href="https://github.com/guilherme-wallace" target="_blank">Guilherme Wallace</a>
                </p>
            </div>
        </div>
    </footer>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div id="toastCopiado" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
          <div class="toast-body">
            <i class="bi bi-check-circle me-2"></i> Relatório copiado para a área de transferência!
          </div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>
    </div>

    <script src="javascripts/jquery.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="javascripts/monitoramento-de-falhas.js"></script>
</body>
</html>
